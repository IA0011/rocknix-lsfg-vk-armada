name: Build Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Package
        run: |
          mkdir -p armada-lsfg-vk
          cp plugin.json main.py install-armada.sh package.json armada-lsfg-vk/
          cp -r dist armada-lsfg-vk/
          zip -r armada-lsfg-vk.zip armada-lsfg-vk/

      - uses: actions/upload-artifact@v4
        with:
          name: armada-lsfg-vk
          path: armada-lsfg-vk.zip
